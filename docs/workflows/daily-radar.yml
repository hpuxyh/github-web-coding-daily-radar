name: daily-radar

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily radar
        env:
          GITHUB_TOKEN: ${{ secrets.RADAR_GITHUB_TOKEN || github.token }}
        run: |
          python3 scripts/github_xhs_daily.py run --request-interval 1.2
          python3 scripts/github_xhs_daily.py embed

      - name: Verify build
        run: npm run build

      - name: Commit daily snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radar.html public/radar.html public/daily public/assets/readme-images
          if git diff --cached --quiet; then
            echo "No daily changes to commit."
          else
            git commit -m "Refresh daily radar snapshot"
            git push
          fi
